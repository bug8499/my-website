<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Main</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d1f0f;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background-color: #1a3d1e;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      border-bottom: 2px solid #2e7d32;
      box-shadow: 0 2px 12px rgba(46, 125, 50, 0.4);
    }

    .nav-logo {
      color: #69f070;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      color: #a5d6a7;
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: #69f070;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    .greeting-badge {
      background-color: #1b5e20;
      color: #69f070;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 18px;
      border-radius: 999px;
      border: 1px solid #2e7d32;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    h1 {
      color: #e8f5e9;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    h1 span {
      color: #69f070;
    }

    .subtitle {
      color: #81c784;
      font-size: 1.15rem;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      background-color: #2e7d32;
      color: #e8f5e9;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover {
      background-color: #388e3c;
      transform: translateY(-1px);
    }

    .btn-outline {
      background-color: transparent;
      color: #69f070;
      border: 2px solid #2e7d32;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-outline:hover {
      background-color: #1b5e20;
      transform: translateY(-1px);
    }

    footer {
      text-align: center;
      padding: 1.2rem;
      color: #4caf50;
      font-size: 0.8rem;
      border-top: 1px solid #1a3d1e;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">&#9670; DevSpace</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="greeting-badge">Welcome</div>
    <h1>Hello, <span>Dev In Main Page</span> !</h1>
    <p class="subtitle">ยินดีต้อนรับสู่พื้นที่ของนักพัฒนา พร้อมสร้างสิ่งใหม่ ๆ แล้วหรือยัง?</p>
    <div class="btn-group">
      <button class="btn-primary">Get Started</button>
      <button class="btn-outline">Learn More</button>
    </div>
  </section>

  <footer>
    &copy; 2026 MainSpace &mdash; Built with green energy 🌿
  </footer>

</body>
</html>
